services:

  db:
    image: postgres:16-alpine
    container_name: tod_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truth_or_dare}
      POSTGRES_USER: ${POSTGRES_USER:-tod_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tod_user} -d ${POSTGRES_DB:-truth_or_dare}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tod_net

  redis:
    image: redis:7-alpine
    container_name: tod_redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - tod_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tod_app
    restart: always
    env_file:
      - .env
    volumes:
      - media_storage:/app/media_storage
      - ./logs:/app/logs
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - tod_net

networks:
  tod_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  media_storage:
